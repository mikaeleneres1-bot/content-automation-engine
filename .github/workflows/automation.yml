name: Content Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install ffmpeg -y

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python core/pipeline.py

      - name: Commit results
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "actions@github.com"
          git add output/*
          git commit -m "novo conteúdo automático" || echo "sem mudanças"
          git push
